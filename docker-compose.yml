services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    container_name: chamados-app
    env_file:
      - path: .env
        required: false
    environment: &app_env
      APP_URL: http://localhost:8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: sistema_chamados
      DB_USERNAME: chamados
      DB_PASSWORD: chamados
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAILPIT_UI_URL: http://localhost:8025
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - chamados
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: nginx
    container_name: chamados-nginx
    ports:
      - "8080:80"
    depends_on:
      - app
    networks:
      - chamados
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: chamados-mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sistema_chamados
      MYSQL_USER: chamados
      MYSQL_PASSWORD: chamados
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - chamados
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chamados-redis
    networks:
      - chamados
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: chamados-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - chamados
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    container_name: chamados-worker
    env_file:
      - path: .env
        required: false
    environment: *app_env
    command: php artisan queue:work redis --sleep=3 --tries=3
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      - app
    networks:
      - chamados
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5
    container_name: chamados-phpmyadmin
    ports:
      - "8085:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: chamados
      PMA_PASSWORD: chamados
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - chamados
    restart: unless-stopped

networks:
  chamados:
    driver: bridge

volumes:
  mysql_data:
  storage:
