services:
  nginx:
    image: nginx:1.27-alpine
    container_name: chamados-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - chamados
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: chamados-app
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "false"
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DOCKER_WARM_CACHE: "true"
    volumes:
      - .:/var/www/html:delegated
      # Volumes nomeados — reduz I/O do bind mount no Windows (vendor/node_modules)
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(0);'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - chamados
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: chamados-mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: sistema_chamados
      MYSQL_USER: root_docker
      MYSQL_PASSWORD: password
    command:
      - --innodb-buffer-pool-size=256M
      - --innodb-log-file-size=64M
      - --max-connections=100
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - chamados
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5
    container_name: chamados-phpmyadmin
    ports:
      - "8085:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root_docker
      PMA_PASSWORD: password
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - chamados
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chamados-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - chamados
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: chamados-worker
    env_file:
      - .env
    environment:
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
    command: php artisan queue:work redis --tries=3 --timeout=90 --sleep=3
    volumes:
      - .:/var/www/html:delegated
      - vendor_data:/var/www/html/vendor
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - chamados

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: chamados-scheduler
    env_file:
      - .env
    environment:
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html:delegated
      - vendor_data:/var/www/html/vendor
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - chamados

networks:
  chamados:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  vendor_data:
    driver: local
  node_modules_data:
    driver: local
