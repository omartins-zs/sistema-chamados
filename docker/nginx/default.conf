# Resolver DNS interno do Docker — evita 502 após recreate do container app
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 32M;

    # Logs reduzidos em ambiente local
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Variável + resolver = upstream dinâmico (não prende IP antigo do app)
    set $php_backend app:9000;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Assets estáticos — cache curto local
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass $php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout    120s;
        fastcgi_read_timeout    120s;

        fastcgi_buffer_size          32k;
        fastcgi_buffers              8 32k;
        fastcgi_busy_buffers_size    64k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
