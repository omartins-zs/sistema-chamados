; Performance — ambiente Docker local (Windows bind mount)
; Reinicie o container app após alterar arquivos PHP quando opcache.validate_timestamps=0

[PHP]
memory_limit = 512M
max_execution_time = 120
max_input_time = 120
post_max_size = 32M
upload_max_filesize = 32M
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
log_errors = On
date.timezone = America/Sao_Paulo

; Reduz stat() em bind mounts do Windows
realpath_cache_size = 4096K
realpath_cache_ttl = 600

[opcache]
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; Desliga revalidação — ganho real em Docker Desktop + volume montado
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1
