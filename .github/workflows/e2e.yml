name: Testes E2E e Frontend

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências Node
        run: npm ci

      - name: Testes frontend (Vitest + cobertura 90%)
        run: npm run test:frontend:coverage

  e2e:
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite
          coverage: none

      - name: Instalar dependências PHP
        run: composer install --no-interaction --prefer-dist

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências Node e Chromium
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Playwright — projeto public
        run: npm run test:e2e:public

      - name: Playwright — projeto admin
        run: npm run test:e2e:admin

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
